# ──────────────────────────────────────────────
# ComfyForge Configuration
# ──────────────────────────────────────────────

comfyui:
  # Path to your ComfyUI installation
  path: "C:/Users/awais/AppData/Local/Programs/ComfyUI/resources/ComfyUI"
  # Data directory with models, custom_nodes, etc.
  data_path: "D:/ComfyUI"
  host: "127.0.0.1"
  port: 8188
  # Auto-start ComfyUI if not running
  auto_start: true

paths:
  # Where generated outputs go
  output: "D:/Work/UraanAI/AI/comfy-gen/outputs"
  # Temp workspace
  temp: "D:/Work/UraanAI/AI/comfy-gen/temp"
  # Custom workflows dir (optional overrides)
  workflows: "D:/Work/UraanAI/AI/comfy-gen/workflows"

models:
  # ComfyUI model directories (auto-detected from comfyui.path if blank)
  checkpoints: ""   # defaults to {comfyui.path}/models/checkpoints
  loras: ""          # defaults to {comfyui.path}/models/loras
  vae: ""            # defaults to {comfyui.path}/models/vae
  controlnet: ""     # defaults to {comfyui.path}/models/controlnet
  clip: ""           # defaults to {comfyui.path}/models/clip
  upscale: ""        # defaults to {comfyui.path}/models/upscale_models
  animatediff: ""    # defaults to {comfyui.path}/models/animatediff_models
  svd: ""            # defaults to {comfyui.path}/models/svd

firebase:
  # Path to your Firebase service account JSON
  credentials: "configs/firebase-service-account.json"
  # Firestore collection that stores model download links
  collection: "comfyforge_models"
  # Storage bucket for private model mirrors
  bucket: "your-project.appspot.com"

huggingface:
  # HuggingFace API token for downloading gated/private models
  # Get yours at https://huggingface.co/settings/tokens
  token: ""

civitai:
  # CivitAI API token for downloading models
  # Get yours at https://civitai.com/user/account -> API Keys
  api_token: ""

firecrawl:
  # FireCrawl API key for web-search model discovery (last-resort fallback)
  api_key: "fc-ebeb763d7538425baf0235a629456006"

defaults:
  # Default generation settings
  image:
    width: 1024
    height: 1024
    steps: 25
    cfg: 7.0
    sampler: "euler_ancestral"
    scheduler: "normal"
    batch_size: 1
  video:
    frames: 24
    fps: 8
    motion_strength: 0.7
  audio:
    engine: "bark"           # bark | f5tts | kokoro
    voice: "v2/en_speaker_6"

# Preferred model stacks per pipeline
stacks:
  text2img:
    checkpoint: "sd_xl_base_1.0.safetensors"
    vae: "sdxl_vae.safetensors"
    loras: []

  text2img_flux:
    checkpoint: "flux1-dev.safetensors"
    clip: ["t5xxl_fp16.safetensors", "clip_l.safetensors"]
    vae: "ae.safetensors"
    loras: []

  img2vid:
    model: "svd_xt_1_1.safetensors"

  img2vid_animatediff:
    checkpoint: "sd_xl_base_1.0.safetensors"
    motion_module: "mm_sdxl_v10_beta.safetensors"
    loras: []

  img2vid_wan:
    checkpoint: "wan2.1_i2v_480p_14B_fp16.safetensors"

  text2vid_wan:
    checkpoint: "wan2.1_t2v_14B_fp16.safetensors"

  audio:
    bark_model: "suno/bark"
    f5tts_model: "SWivid/F5-TTS"

# ──────────────────────────────────────────────
# Model Architecture Definitions
# ──────────────────────────────────────────────
# Maps CivitAI baseModel names to their loader requirements.
# When clone-civitai encounters a model, it looks up the architecture
# here to know which nodes, CLIP files, and VAE to use.
# Add new architectures here -- no code changes needed.
architectures:
  sd15:
    aliases: ["SD 1.4", "SD 1.5", "SD 1.5 LCM", "SD 2.1"]
    loader: checkpoint          # CheckpointLoaderSimple (has CLIP+VAE built-in)
    workflow: text2img_sdxl
    lora_loader: standard       # LoraLoader (model + clip)
    defaults:
      cfg: 7.0
      steps: 25
      sampler: euler_ancestral
      scheduler: normal

  sdxl:
    aliases: ["SDXL 0.9", "SDXL 1.0", "SDXL 1.0 LCM", "SDXL Turbo", "SDXL Lightning", "Pony"]
    loader: checkpoint
    workflow: text2img_sdxl
    lora_loader: standard
    defaults:
      cfg: 7.0
      steps: 25
      sampler: euler_ancestral
      scheduler: normal

  flux:
    aliases: ["Flux.1 D", "Flux.1 S"]
    loader: unet                # UNETLoader (separate CLIP+VAE needed)
    clip: ["t5xxl_fp16.safetensors", "clip_l.safetensors"]
    clip_type: flux             # DualCLIPLoader type parameter
    vae: "ae.safetensors"
    workflow: text2img_flux
    lora_loader: model_only     # LoraLoaderModelOnly
    defaults:
      cfg: 1.0
      steps: 20
      guidance: 3.5
      sampler: euler
      scheduler: simple

  zimageturbo:
    aliases: ["ZImageTurbo", "ZImageBase"]
    loader: unet
    clip: ["qwen_3_4b.safetensors"]
    clip_type: ltxv             # CLIPLoader type parameter
    vae: "ae.safetensors"
    workflow: text2img_zimageturbo
    lora_loader: model_only
    defaults:
      cfg: 1.0
      steps: 8
      guidance: 1.0
      sampler: euler
      scheduler: simple

  # ── Video architectures ─────────────────────────────────────────────
  # These route CivitAI video posts to the matching video workflow factory
  # in core/workflows.py. Add new video bases here -- no code changes needed.
  wan_t2v:
    aliases: ["Wan Video 14B t2v", "Wan Video 14B T2V", "Wan 2.1 T2V", "Wan Video 1.3B t2v", "Wan Video", "Wan Video 2.2 T2V-A14B"]
    loader: checkpoint
    workflow: text2vid_wan
    lora_loader: standard
    checkpoint_model_ids: ["wan_t2v"]
    checkpoint_match: ["wan"]
    defaults:
      cfg: 6.0
      steps: 30
      sampler: euler
      scheduler: normal
      frames: 81

  wan_i2v:
    aliases: ["Wan Video 14B i2v 480p", "Wan Video 14B i2v 720p", "Wan 2.1 I2V", "Wan Video i2v", "Wan Video 2.2 I2V-A14B"]
    loader: checkpoint
    workflow: img2vid_wan
    lora_loader: standard
    requires_init_image: true
    # When CivitAI didn't provide a source still, ComfyForge falls back to
    # this t2v architecture so the workflow is runnable without manual setup.
    t2v_fallback: wan_t2v
    # Registry model IDs to auto-download when no matching checkpoint is
    # installed locally. Tried in order. See configs/models.yaml.
    checkpoint_model_ids: ["wan_i2v"]
    # Substring match against installed checkpoint filenames. Any file that
    # contains one of these is accepted as a usable Wan I2V base.
    checkpoint_match: ["wan"]
    defaults:
      cfg: 6.0
      steps: 30
      sampler: euler
      scheduler: normal
      frames: 81

  svd:
    aliases: ["SVD", "SVD XT", "SVD 1.1", "Stable Video Diffusion"]
    loader: image_only_checkpoint
    workflow: img2vid_svd
    lora_loader: none
    requires_init_image: true
    defaults:
      cfg: 2.5
      steps: 20
      frames: 25
      fps: 8

  animatediff_sdxl:
    aliases: ["AnimateDiff SDXL", "AnimateDiff", "AnimateDiff SD 1.5", "AnimateDiff LCM"]
    loader: checkpoint
    workflow: img2vid_animatediff
    lora_loader: standard
    requires_init_image: true
    requires_motion_module: true
    defaults:
      cfg: 7.0
      steps: 20
      frames: 16
      fps: 8
